<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WDD 230 - Form Submission">
    <meta name="author" content="Matthew Knorr">
    <meta name="title" content="Form Submission Page">
    <meta name="type" content="website">
    <meta name="image" content="https://www.americanfork.gov/ImageRepository/Document?documentID=13107">
    <meta name="url" content="https://matthewknorr.github.io/wdd230/">
    <title>Matthew Knorr - WDD 230 - Web Frontend Development - Form Submission</title>
    <link rel="stylesheet" type="text/css" href="../wdd230/styles/form.css">

</head>
<body>
    <div class="form-container">
        <form method="get" action="record.html">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required placeholder="Replace This">
    
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required pattern="^[a-zA-Z0-9]{8,}$" placeholder="Replace This">
          <p>Password must be at least eight characters long and can only be alpha-numeric.</p>
    
          <label for="confirmPassword">Password repeated for confirmation:</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required oninput="validatePassword()" placeholder="Replace This" >
          <p id="passwordMismatch">Passwords do not match.</p>
    
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" title="Please enter a valid email address" placeholder="Replace This">
    
          <label for="pageRating">Page Rating:</label>
          <input type="range" id="pageRating" name="pageRating" min="1" max="10" step="1">
          <output for="pageRating">(1 - 10)</output>
    
          <div class="submit-button">
          <button type="submit">Submit</button>
        </div>
        </form>
      </div>
      <script src="../wdd230/scripts/validate.js"></script>
</body>

</html>
